<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06060a"/>
      <stop offset="100%" stop-color="#0c0a1a"/>
    </linearGradient>
    <radialGradient id="g1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="60%" cy="20%" r="25%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#g1)"/>
  <rect width="1920" height="1080" fill="url(#g2)"/>
  <rect width="1920" height="1080" fill="url(#g3)"/>
  <!-- Subtle grid lines -->
  <g opacity="0.03" stroke="#8b5cf6" stroke-width="0.5">
    <line x1="0" y1="200" x2="1920" y2="200"/>
    <line x1="0" y1="400" x2="1920" y2="400"/>
    <line x1="0" y1="600" x2="1920" y2="600"/>
    <line x1="0" y1="800" x2="1920" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="1080"/>
    <line x1="800" y1="0" x2="800" y2="1080"/>
    <line x1="1200" y1="0" x2="1200" y2="1080"/>
    <line x1="1600" y1="0" x2="1600" y2="1080"/>
  </g>
  <!-- Floating orbs -->
  <circle cx="300" cy="250" r="120" fill="#8b5cf6" opacity="0.03" filter="blur(60px)"/>
  <circle cx="1600" cy="750" r="150" fill="#6366f1" opacity="0.025" filter="blur(80px)"/>
  <circle cx="960" cy="150" r="80" fill="#a855f7" opacity="0.02" filter="blur(40px)"/>
  <!-- Film-strip dots -->
  <g opacity="0.06" fill="#8b5cf6">
    <circle cx="100" cy="540" r="2"/>
    <circle cx="200" cy="300" r="1.5"/>
    <circle cx="500" cy="800" r="1"/>
    <circle cx="700" cy="200" r="2"/>
    <circle cx="1100" cy="900" r="1.5"/>
    <circle cx="1400" cy="400" r="1"/>
    <circle cx="1700" cy="600" r="2"/>
    <circle cx="1800" cy="200" r="1.5"/>
  </g>
</svg>
